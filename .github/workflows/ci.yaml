name: Machine Learning Workflow CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  mlflow-ci:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # PENTING: Wajib ditambahkan agar git push berhasil

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Install Base Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install mlflow dagshub pandas scikit-learn matplotlib seaborn joblib

      - name: Run MLflow Project (Retraining)
        env:
          MLFLOW_TRACKING_URI: https://dagshub.com/ariefwcks303/Eksperimen_SML_Arief.mlflow
          DAGSHUB_USER_TOKEN: ${{ secrets.DAGSHUB_TOKEN }}
        run: |
          cd MLProject
          python modelling.py --n_estimators 100 --max_depth 10

      - name: Build Docker Image
        run: |
          cd MLProject
          docker build -t ariefwcksdevs/student-placement-model:latest .

      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Push Docker Image to Docker Hub
        run: |
          docker push ariefwcksdevs/student-placement-model:latest

      - name: Commit Model Artefacts
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "github-actions@github.com"
          git add MLProject/model/
          # Cek apakah ada perubahan sebelum commit agar tidak error
          if git diff --quiet && git diff --cached --quiet; then
            echo "Tidak ada perubahan pada folder model, skip commit."
          else
            git commit -m "Automated update: Model artifacts for $(date +'%Y-%m-%d')"
            git push
          fi
