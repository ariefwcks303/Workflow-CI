name: Machine Learning Workflow CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  mlflow-ci:
    runs-on: ubuntu-latest

    steps:
      # 1. Mengunduh source code dari GitHub ke server cloud
      - name: Checkout Code
        uses: actions/checkout@v3

      # 2. Menginstal Python versi 3.10 di server cloud
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      # 3. Menginstal library MLflow dan semua dependensi pendukung proyek
      - name: Install Base Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install mlflow dagshub pandas scikit-learn matplotlib seaborn joblib

      # 4. Melatih ulang model secara otomatis & mengunci RUN_ID secara silent/non-interaktif
      - name: Run MLflow Project (Retraining)
        env:
          MLFLOW_TRACKING_URI: https://dagshub.com/${{ secrets.DAGSHUB_USERNAME }}/Workflow-CI.mlflow
          MLFLOW_TRACKING_USERNAME: ${{ secrets.DAGSHUB_USERNAME }}
          MLFLOW_TRACKING_PASSWORD: ${{ secrets.DAGSHUB_TOKEN }}
          DAGSHUB_USER_TOKEN: ${{ secrets.DAGSHUB_TOKEN }}
        run: |
          cd MLProject
          python modelling.py --n_estimators 100 --max_depth 10

          # Taktik absolut: Ambil RUN_ID dari aktivitas run paling terakhir di local tracking server
          echo "RUN_ID=$(python -c "import mlflow; print(mlflow.last_active_run().info.run_id if mlflow.last_active_run() else '')")" >> $GITHUB_ENV

      # 5. Membungkus model menjadi Docker Image menggunakan RUN_ID otomatis
      - name: Build Docker Image using MLflow
        env:
          MLFLOW_TRACKING_URI: https://dagshub.com/${{ secrets.DAGSHUB_USERNAME }}/Workflow-CI.mlflow
          MLFLOW_TRACKING_USERNAME: ${{ secrets.DAGSHUB_USERNAME }}
          MLFLOW_TRACKING_PASSWORD: ${{ secrets.DAGSHUB_TOKEN }}
        run: |
          mlflow models build-docker -m "runs:/${{ env.RUN_ID }}/model" -n "ariefwcksdevs/student-placement-model:latest" --enable-mlserver

      # 6. Login ke Akun Docker Hub menggunakan Secrets keamanan
      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # 7. Mendorong (Push) Docker Image hasil training ke Docker Hub Cloud
      - name: Push Docker Image to Docker Hub
        run: |
          docker push ariefwcksdevs/student-placement-model:latest
