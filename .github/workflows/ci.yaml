name: Machine Learning Workflow CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  mlflow-ci:
    runs-on: ubuntu-latest

    steps:
      # 1. Mengunduh source code dari GitHub ke server cloud
      - name: Checkout Code
        uses: actions/checkout@v3

      # 2. Menginstal Python versi 3.10 di server cloud
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      # 3. Menginstal library MLflow dan pendukungnya untuk menjembatani MLProject
      - name: Install Base Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install mlflow dagshub

      # 4. Melatih ulang model secara otomatis menggunakan MLflow Project
      - name: Run MLflow Project (Retraining)
        env:
          MLFLOW_TRACKING_USERNAME: ${{ secrets.DAGSHUB_USERNAME }}
          MLFLOW_TRACKING_PASSWORD: ${{ secrets.DAGSHUB_TOKEN }}
        run: |
          mlflow run MLProject --experiment-name Student_Placement_Advance

      # 5. Membungkus model menjadi Docker Image (Syarat Saklek Kriteria Advanced)
      - name: Build Docker Image using MLflow
        env:
          MLFLOW_TRACKING_URI: https://dagshub.com/${{ secrets.DAGSHUB_USERNAME }}/Workflow-CI.mlflow
        run: |
          mlflow run MLProject --env-manager local --param-list n_estimators=100 --param-list max_depth=10

      # 6. Login ke Akun Docker Hub milikmu menggunakan Secrets keamanan
      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # 7. Mendorong (Push) Docker Image hasil training ke Docker Hub Cloud
      - name: Push Docker Image to Docker Hub
        run: |
          docker push ariefwcksdevs/student-placement-model:latest
